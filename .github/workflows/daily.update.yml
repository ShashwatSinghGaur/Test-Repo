name: Daily Nifty Data Update

on:
  schedule:
    # Runs at 12:30 UTC = 6:00 PM IST, Mon–Fri (after NSE close)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: 

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 

      - name: Run data generator
        run: python generate_data.py 

      - name: Verify Master_Data.parquet was created
        run: |
          if [ ! -f "Master_Data.parquet" ]; then
            echo "ERROR: Master_Data.parquet was not created!"
            exit 1
          fi

      - name: Commit and push updated file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Master_Data.parquet
          git diff --staged --quiet || (git commit -m "chore: automated daily market data update" && git push)
